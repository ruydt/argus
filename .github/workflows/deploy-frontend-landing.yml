name: Deploy Frontend Landing

on:
  push:
    branches:
      - main
    paths:
      - 'frontend-landing/**'

jobs:
  build-and-deploy:
    name: Build, Push & Deploy to EC2
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm via corepack
        run: corepack enable && corepack prepare pnpm@10.23.0 --activate

      - name: Install dependencies
        working-directory: frontend-landing
        run: pnpm install --frozen-lockfile

      - name: Run tests
        working-directory: frontend-landing
        run: pnpm run test

      - name: Lowercase repository owner
        id: repo_owner
        run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: frontend-landing
          push: true
          tags: ghcr.io/${{ steps.repo_owner.outputs.owner }}/frontend-landing:latest
          provenance: false

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "frontend-landing/docker-compose.yml"
          target: "~/frontend-landing-deploy"
          strip_components: 1

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd ~/frontend-landing-deploy
            export IMAGE_NAME=ghcr.io/${{ steps.repo_owner.outputs.owner }}/frontend-landing:latest
            docker compose pull
            docker compose up -d
            docker image prune -f
            echo "✅ Deploy bằng Docker Compose thành công!"
