name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  NODE_VERSION: '20'

jobs:
  # ── Build the React SPA once; reused by backend + playwright ─────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: frontend
        run: pnpm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ── Frontend checks (parallel with build-frontend) ───────────────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: frontend
        run: pnpm run typecheck

      - name: Lint & format check
        working-directory: frontend
        run: pnpm run lint && pnpm run format:check

      - name: Test
        working-directory: frontend
        run: pnpm run test -- --run

  # ── Backend checks (needs built frontend for go:embed) ───────────────────
  backend:
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: backend/internal/ui/dist

      - name: Build backend (verifies embed compiles)
        working-directory: backend
        run: go build ./...

      - name: Test
        working-directory: backend
        run: go test ./...

      - name: Vet
        working-directory: backend
        run: go vet ./...

      - name: govulncheck
        working-directory: backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...
        continue-on-error: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          working-directory: backend
          version: v2.12.2

  # ── Playwright e2e (needs both backend checks + built frontend) ───────────
  playwright:
    runs-on: ubuntu-latest
    needs: [backend, frontend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: backend/internal/ui/dist

      - name: Build backend binary
        working-directory: backend
        run: go build -o hooker ./cmd/server

      - name: Install Playwright dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start hooker server
        run: |
          DB_PATH=/tmp/hooker-playwright-ci.db ./backend/hooker &
          until curl -sf http://127.0.0.1:8765/healthz; do sleep 1; done
        timeout-minutes: 1

      - name: Run Playwright smoke tests
        run: npx playwright test --project=chromium

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
