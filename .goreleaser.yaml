# GoReleaser OSS v2 configuration
# Docs: https://goreleaser.com
version: 2

before:
  hooks:
    # Build frontend first — the Go binary embeds frontend/dist/* via //go:embed in
    # backend/internal/ui/ui.go. GoReleaser's own dist/ output is a different directory.
    - bash -c "cd frontend && pnpm install --frozen-lockfile && pnpm run build"
    - bash -c "rm -rf backend/internal/ui/dist && mkdir -p backend/internal/ui && cp -R frontend/dist backend/internal/ui/dist"

builds:
  - id: argus
    main: ./cmd/server
    dir: backend
    binary: argus
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      # Package path matches module: argus/internal/version (NOT main.version)
      - -X argus/internal/version.Version={{.Version}}
      - -X argus/internal/version.Commit={{.Commit}}
      - -X argus/internal/version.BuildDate={{.Date}}

archives:
  - id: default
    name_template: "argus_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true

release:
  header: |
    ## Argus v0.1.0 — First Public Release

    **Argus** is a local-first monitoring dashboard for AI coding agent activity. Install it in under 10 minutes and get full visibility into your Claude Code, Codex, and Gemini CLI sessions — no cloud dependencies, no data leaving your machine.

    ### What's included

    **Agents supported**
    - Claude Code — full hook payload normalization, token usage breakdown, tool call rendering
    - Codex — session tracking, file diff rendering, tool call events
    - Gemini CLI (Antigravity) — hook payload normalization and session tracking

    **Event feed**
    - Real-time event stream via SSE
    - Filter by agent, event type, session, keyword
    - Expandable raw payload modal per event
    - Tool call and diff renderers

    **Sessions**
    - Session tree with parent/child spawn relationships
    - Per-session file change tracking
    - Session duration and status indicators

    **Dashboard**
    - Aggregate stats: events, sessions, tokens, tool calls
    - Usage breakdown by agent and model
    - Date-range filtering

    **Diagnostics**
    - Filesystem health check (DB path, transcript dirs)
    - Hook scripts log viewer
    - Version and build info endpoint

    **Hooks configuration UI**
    - Generate and install `hooks.json` for Claude Code, Codex, and Gemini CLI
    - Preset levels: minimal, standard, full
    - One-click install / uninstall scripts
    - Simulate hooks behavior

    ### Install

    Download the binary for your platform from the assets below, or install from source:

    ```bash
    git clone https://github.com/duytrandt04-afk/argus
    cd argus && make install
    ```
