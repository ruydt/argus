# GoReleaser OSS v2 configuration
# Docs: https://goreleaser.com
version: 2

before:
  hooks:
    # Build frontend first — the Go binary embeds frontend/dist/* via //go:embed in
    # backend/internal/ui/ui.go. GoReleaser's own dist/ output is a different directory.
    - bash -c "cd frontend && pnpm install --frozen-lockfile && pnpm run build"
    - bash -c "rm -rf backend/internal/ui/dist && mkdir -p backend/internal/ui && cp -R frontend/dist backend/internal/ui/dist"

builds:
  - id: argus
    main: ./cmd/server
    dir: backend
    binary: argus
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      # Package path matches module: argus/internal/version (NOT main.version)
      - -X argus/internal/version.Version={{.Version}}
      - -X argus/internal/version.Commit={{.Commit}}
      - -X argus/internal/version.BuildDate={{.Date}}

archives:
  - id: default
    name_template: "argus_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    # Windows users expect .zip; everything else stays tar.gz.
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true

release:
  header: |
    ## Argus v1.0.0 — first stable release

    Argus is a local-first hook control center for AI coding agents: manage hook
    configs with one-click presets, test any hook in the built-in simulator before
    a live agent fires it, share and install community hook scripts, and observe
    every Claude Code / Codex session in real time. Runs as a single local binary —
    no cloud, no external infra.

    ### Highlights

    - **Hook management** — structured + JSON editors for Claude Code and Codex with one-click presets.
    - **Hook simulator** — run any hook command or `~/.argus/hooks` script against a synthetic payload and inspect stdout/stderr/exit code before a real agent fires it.
    - **Community script sharing** — browse, install, and (via optional GitHub login) publish hook scripts to the public registry; back up your collection to a private gist.
    - **Observability** — live event feed (SSE), dashboard stats, usage breakdown, projects/sessions explorer, diagnostics.
    - **Lean storage** — `raw_payload` is stored gzip-compressed; the Diagnostics page has a **Compact database** action (gzip-backfill + VACUUM) and optional retention (`ARGUS_RETENTION_DAYS` / `ARGUS_MAX_EVENTS`, off by default).

    ### Security posture

    Binds to `127.0.0.1` by default; cross-site browser requests to sensitive and
    state-changing endpoints are rejected. Captured data (prompts, diffs, tool
    output) never leaves the machine. `ARGUS_ALLOW_REMOTE=1` opts into non-loopback
    bind and is unsupported for public exposure — the hook simulator and reveal
    endpoints run local commands.

    ### Upgrade notes

    Migrations run automatically on first start. Argus refuses to open a database
    created by a newer version. No manual action required.

    ### Install

    Download the binary for your platform from the assets below, or build from source:

    ```bash
    git clone https://github.com/ruydt/argus
    cd argus && make build-local   # builds to ~/.argus/bin/argus
    ```
